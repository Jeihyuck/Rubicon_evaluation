name: Samsung Chat QA Automation

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      max_questions:
        description: "Number of questions to run (0 = all)"
        required: false
        default: "3"
      headless:
        description: "Run browser in headless mode (true/false)"
        required: false
        default: "true"

  # Scheduled run – once per day at 01:00 UTC
  # (Adjust the cron expression to change the schedule.  All times are UTC.)
  schedule:
    - cron: "0 1 * * *"

jobs:
  qa-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      # ------------------------------------------------------------------ #
      # 1. Check out the repository                                          #
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Set up Python 3.11                                                #
      # ------------------------------------------------------------------ #
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ------------------------------------------------------------------ #
      # 3. Install Python dependencies                                       #
      # ------------------------------------------------------------------ #
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------------------------------------------ #
      # 4. Install Playwright + Chromium                                     #
      # ------------------------------------------------------------------ #
      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      # ------------------------------------------------------------------ #
      # 5. Run the QA automation                                             #
      # ------------------------------------------------------------------ #
      - name: Run Samsung Chat QA
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SAMSUNG_BASE_URL: "https://www.samsung.com/"
          HEADLESS: ${{ github.event.inputs.headless || 'true' }}
          DEFAULT_LOCALE: "en-US"
          MAX_QUESTIONS: ${{ github.event.inputs.max_questions || '3' }}
          OPENAI_MODEL: "gpt-4o"
          PLAYWRIGHT_TIMEOUT_MS: "30000"
          ANSWER_STABLE_CHECKS: "3"
          ANSWER_STABLE_INTERVAL_SEC: "1.0"
        run: |
          python run.py
        # Continue to the artifact-upload step even if this step fails
        continue-on-error: true

      # ------------------------------------------------------------------ #
      # 6. Upload reports and screenshots as workflow artifacts              #
      #    (always runs so evidence is preserved even on failure)           #
      # ------------------------------------------------------------------ #
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports-${{ github.run_number }}
          path: |
            reports/
          retention-days: 30

      - name: Upload screenshots – full page
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-fullpage-${{ github.run_number }}
          path: |
            artifacts/fullpage/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload screenshots – chat area
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-chatbox-${{ github.run_number }}
          path: |
            artifacts/chatbox/
          retention-days: 30
          if-no-files-found: ignore
