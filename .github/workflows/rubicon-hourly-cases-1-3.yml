name: Rubicon Hourly Cases 1-3

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-rubicon-cases:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
        working-directory: samsung-rubicon-qa
    env:
      HEADLESS: 'true'
      RUN_MODE: 'standard'
      MAX_QUESTIONS: '3'
      CASE_IDS: 'case01,case02,case03'
      PLAYWRIGHT_TIMEOUT_MS: '45000'
      ANSWER_STABLE_CHECKS: '4'
      ANSWER_STABLE_INTERVAL_SEC: '1.0'
      ENABLE_MESSAGE_HISTORY_ON_SUCCESS: 'true'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Restore Samsung login storage state
        env:
          SAMSUNG_STORAGE_STATE_JSON_BASE64: ${{ secrets.SAMSUNG_STORAGE_STATE_JSON_BASE64 }}
        run: |
          if [[ -z "${SAMSUNG_STORAGE_STATE_JSON_BASE64}" ]]; then
            echo "Missing required secret: SAMSUNG_STORAGE_STATE_JSON_BASE64" >&2
            exit 1
          fi
          mkdir -p .secrets
          printf '%s' "${SAMSUNG_STORAGE_STATE_JSON_BASE64}" | base64 --decode > .secrets/samsung_storage_state.json

      - name: Run Rubicon QA cases 1-3
        run: python run.py

      - name: Publish markdown summary table
        if: always()
        run: |
          if [[ -f reports/latest_results_table.md ]]; then
            cat reports/latest_results_table.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "results table not found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rubicon-hourly-cases-1-3-${{ github.run_id }}
          path: |
            samsung-rubicon-qa/reports/latest_results.json
            samsung-rubicon-qa/reports/latest_results.csv
            samsung-rubicon-qa/reports/latest_results_table.md
            samsung-rubicon-qa/reports/latest_conversation.md
            samsung-rubicon-qa/reports/summary.md
            samsung-rubicon-qa/artifacts/chatbox
            samsung-rubicon-qa/artifacts/fullpage
          if-no-files-found: warn