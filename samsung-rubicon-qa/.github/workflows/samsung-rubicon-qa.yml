name: samsung-rubicon-qa
"on":
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  rubicon-qa:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SAMSUNG_BASE_URL: https://www.samsung.com/sec/
      HEADLESS: "true"
      DEFAULT_LOCALE: "ko-KR"
      MAX_QUESTIONS: "5"
      OPENAI_MODEL: gpt-4o
      PLAYWRIGHT_TIMEOUT_MS: "30000"
      ANSWER_STABLE_CHECKS: "3"
      ANSWER_STABLE_INTERVAL_SEC: "1.0"
      RUBICON_CAPTURE_MODE: "fail_only"
      RUBICON_ENABLE_VIDEO: "false"
      RUBICON_ENABLE_SCREENSHOTS: "false"
      RUBICON_ENABLE_FULLPAGE_SCREENSHOTS: "false"
      RUBICON_ENABLE_CHATBOX_SCREENSHOTS: "false"
      RUBICON_ENABLE_OCR_ON_FAILURE: "true"
      RUBICON_ENABLE_OCR_ALWAYS: "false"
      RUBICON_SAVE_BEFORE_SEND_ON_SUCCESS: "false"
      RUBICON_SAVE_AFTER_ANSWER_ON_SUCCESS: "false"
      RUBICON_UPLOAD_ARTIFACTS_ON_SUCCESS: "false"
      RUBICON_KEEP_ONLY_FAILURE_ARTIFACTS: "true"
      RUBICON_MAX_SCREENSHOTS_PER_CASE: "2"
      ENABLE_VIDEO: "false"
      ENABLE_TRACE: "false"
      ENABLE_OCR_FALLBACK: "false"
      RUBICON_CHAT_DEBUG: "true"
      RUBICON_FORCE_ACTIVATION: "true"
      RUBICON_DISABLE_SDK: "false"
      RUBICON_MAX_INPUT_CANDIDATES: "5"
      RUBICON_FRAME_RESCAN_ROUNDS: "3"
      RUBICON_OPENED_FOOTER_SCREENSHOT: "false"
      RUBICON_BEFORE_SEND_SCREENSHOT: "false"
      RUBICON_AFTER_ANSWER_SCREENSHOT: "false"
    defaults:
      run:
        working-directory: samsung-rubicon-qa
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-nanum fontconfig
          fc-cache -fv

      - name: Install OCR system packages
        if: env.RUBICON_ENABLE_OCR_ON_FAILURE == 'true' || env.RUBICON_ENABLE_OCR_ALWAYS == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-kor

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OCR Python dependencies
        if: env.RUBICON_ENABLE_OCR_ON_FAILURE == 'true' || env.RUBICON_ENABLE_OCR_ALWAYS == 'true'
        run: |
          pip install Pillow pytesseract

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run Samsung Rubicon QA
        run: python run.py

      - name: Upload artifacts on failure only
        if: failure() || env.RUBICON_UPLOAD_ARTIFACTS_ON_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: samsung-rubicon-qa-output
          path: |
            samsung-rubicon-qa/reports/latest_results.json
            samsung-rubicon-qa/reports/latest_results.csv
            samsung-rubicon-qa/reports/summary.md
            samsung-rubicon-qa/reports/latest_conversation.md
            samsung-rubicon-qa/artifacts/chatbox/
